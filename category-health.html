<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Health & Fitness Tools | Affilore</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #08080a; --text-main: #f0f0f5; --text-muted: #9ba1a6;
            --accent-gold: #ffd600; --accent-glow: rgba(255, 214, 0, 0.4);
            --accent-green: #00e676; --green-glow: rgba(0, 230, 118, 0.4);
            --card-bg: rgba(20, 20, 25, 0.6); --border-color: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(12px);
        }
        html, body { max-width: 100vw; overflow-x: hidden; margin: 0; padding: 0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: radial-gradient(circle at top, #0a1a0f 0%, var(--bg-color) 70%); background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; min-height: 100vh; }
        a { text-decoration: none; color: inherit; transition: all 0.3s ease; }
        header { position: fixed; top: 0; width: 100%; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(8, 8, 10, 0.8); backdrop-filter: var(--glass-blur); border-bottom: 1px solid var(--border-color); z-index: 1000; }
        .logo { font-size: 1.8rem; font-weight: 800; color: var(--accent-gold); text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 35px; }
        .category-header { padding: 160px 5% 60px; text-align: center; max-width: 900px; margin: 0 auto; }
        .category-header h1 { font-size: clamp(2.5rem, 5vw, 4rem); color: var(--accent-green); text-shadow: 0 0 20px rgba(0, 230, 118, 0.3); }
        .container { padding: 40px 5% 100px; max-width: 1200px; margin: 0 auto; }
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .tool-card { background: rgba(20, 20, 25, 0.6); border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .tool-card-img { width: 100%; height: 200px; object-fit: cover; }
        .badge { position: absolute; top: 15px; right: 15px; background: rgba(8, 8, 10, 0.85); padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; color: var(--accent-green); border: 1px solid var(--accent-green); }
        .tool-card-body { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .btn-use { margin-top: auto; display: block; text-align: center; border: 1px solid var(--accent-green); color: var(--accent-green); padding: 14px; border-radius: 10px; font-weight: 700; }
        @media (max-width: 768px) { .tools-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo"><img src="logo.jpg" alt="" class="logo-img"> Affilore</a>
    </header>
    <section class="category-header">
        <h1>Health & Fitness</h1>
        <p>Precision calculators to help you optimize your nutrition, track your metabolism, and reach your physical goals with zero data tracking.</p>
    </section>
    <section class="container">
        <div class="tools-grid">
            <div class="tool-card">
                <img src="health/tdee-calculator/tdee-thumb.jpeg" alt="" class="tool-card-img">
                <div class="badge">Health</div>
                <div class="tool-card-body">
                    <h3>Advanced TDEE & Macro Calculator</h3>
                    <a href="health/tdee-calculator/" class="btn-use">Launch Tool →</a>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
