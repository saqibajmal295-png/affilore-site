<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Affilore</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --accent-yellow: #FFD700;
            --card-bg: #111111;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }
        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            background-image: radial-gradient(rgba(255, 215, 0, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            line-height: 1.6;
        }
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; background: rgba(5, 5, 5, 0.9);
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }
        .logo { font-size: 28px; font-weight: 800; color: var(--accent-yellow); text-decoration: none;}
        .nav-links a { color: white; margin-left: 20px; text-decoration: none; font-weight: 600; transition: color 0.3s;}
        .nav-links a:hover { color: var(--accent-yellow); }
        
        .container { max-width: 800px; margin: 60px auto; padding: 40px; background: var(--card-bg); border-radius: 12px; border: 1px solid rgba(255,215,0,0.2); text-align: center; }
        h1 { color: var(--accent-yellow); font-size: 2.5rem; margin-bottom: 10px;}
        p { color: var(--text-muted); margin-bottom: 40px; font-size: 1.1rem;}
        
        .contact-info { margin-bottom: 40px; }
        .email-box { 
            display: inline-block; background: #000; border: 1px solid var(--accent-yellow); 
            padding: 15px 30px; border-radius: 30px; font-size: 1.2rem; font-weight: 600;
        }
        .email-box a { color: var(--text-main); text-decoration: none; }
        .email-box i { color: var(--accent-yellow); margin-right: 10px; }
        
        .social-grid { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .social-card {
            background: #000; border: 1px solid rgba(255,255,255,0.1); padding: 20px; 
            border-radius: 10px; width: 120px; transition: 0.3s; text-decoration: none; color: white;
        }
        .social-card:hover { border-color: var(--accent-yellow); transform: translateY(-5px); }
        .social-card i { font-size: 2rem; margin-bottom: 10px; color: var(--text-muted); transition: 0.3s; }
        .social-card:hover i { color: var(--accent-yellow); }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Affilore</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="contact.html" style="color: var(--accent-yellow);">Contact Us</a>
        </div>
    </nav>

    <div class="container">
        <h1>Get in Touch</h1>
        <p>Have a question, feedback, or need a custom enterprise tool built? We'd love to hear from you. Reach out to us directly via email or connect with us on social media.</p>
        
        <div class="contact-info">
            <div class="email-box">
                <i class="fas fa-envelope"></i>
                <a href="mailto:affilore4@gmail.com">affilore4@gmail.com</a>
            </div>
        </div>

        <h3 style="color: var(--accent-yellow); margin-top: 50px;">Follow Us</h3>
        <div class="social-grid">
            <a href="https://youtube.com/@affilore4?si=60iCl1pScVwA18IC" target="_blank" class="social-card">
                <i class="fab fa-youtube"></i>
                <div>YouTube</div>
            </a>
            <a href="https://www.instagram.com/affilore_/" target="_blank" class="social-card">
                <i class="fab fa-instagram"></i>
                <div>Instagram</div>
            </a>
            <a href="https://www.facebook.com/share/1B2D5tUvU7/" target="_blank" class="social-card">
                <i class="fab fa-facebook"></i>
                <div>Facebook</div>
            </a>
            <a href="https://www.tiktok.com/@affilore" target="_blank" class="social-card">
                <i class="fab fa-tiktok"></i>
                <div>TikTok</div>
            </a>
        </div>
    </div>

</body>
</html>
